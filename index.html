<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الصحة اليومي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="topnav" id="topnav">
        <div class="dropdown">
            <button class="dropbtn">القائمة ▾</button>
            <div class="dropdown-content">
                <a href="#" data-section="home" class="nav-link active">الرئيسية</a>
                <a href="#" data-section="plan" class="nav-link">الجدول اليومي</a>
                <a href="#" data-section="meals" class="nav-link">الوجبات والسعرات</a>
                <a href="#" data-section="progress" class="nav-link">تتبع الالتزام</a>
                <a href="#" data-section="log" class="nav-link">سجل الوزن والملاحظات</a>
                <a href="#" data-section="personal" class="nav-link">البيانات الشخصية</a>
            </div>
        </div>
    </nav>
    <div class="container">
    <section class="home-section section" id="section-home">
            <div id="home-greeting" style="font-size:1.3rem;margin-bottom:8px;"></div>
            <div id="home-motivation" style="font-size:1.1rem;color:#1976d2;margin-bottom:12px;"></div>
            <h2>ملخص اليوم</h2>
            <div id="home-summary"></div>
            <div style="max-width:340px;margin:18px auto 0 auto;">
                <canvas id="home-circle-chart"></canvas>
            </div>
            <div id="home-plan-table" style="margin-top:18px;"></div>
            <section class="meals" id="home-meals-section">
                <h2>تسجيل الوجبات اليومية والسعرات</h2>
                <form id="meal-form">
                    <label for="meal-name">اسم الوجبة:</label>
                    <select id="meal-name" name="meal-name" required>
                        <option value="افطار">افطار</option>
                        <option value="غداء">غداء</option>
                        <option value="عشاء">عشاء</option>
                        <option value="سناك">سناك</option>
                    </select>
                    <label for="food-type">نوع الطعام:</label>
                    <select id="food-type" name="food-type" required></select>
                    <label for="food-amount">الكمية (جم أو وحدة):</label>
                    <input type="number" id="food-amount" name="food-amount" min="1" required>
                    <span id="food-unit"></span>
                    <label for="meal-calories">السعرات (يحسب تلقائياً):</label>
                    <input type="number" id="meal-calories" name="meal-calories" min="0" readonly>
                    <button type="submit">إضافة</button>
                </form>
                <div id="meals-list"></div>
                <div id="meals-total" style="margin-top:8px;font-weight:bold;"></div>
            </section>
        </section>
        <section class="personal-info section" id="section-personal">
            <h2>البيانات الشخصية</h2>
            <form id="personal-form">
                <label for="username">الاسم:</label>
                <input type="text" id="username" name="username" required>
                <br>
                <label for="birthdate">تاريخ الميلاد:</label>
                <input type="date" id="birthdate" name="birthdate" required>
                <br>
                <label for="work-start">بداية الدوام:</label>
                <input type="time" id="work-start" name="work-start" required>
                <label for="work-end">نهاية الدوام:</label>
                <input type="time" id="work-end" name="work-end" required>
                <br>
                <label>أيام العمل:</label>
                <span class="days-checkboxes">
                    <label><input type="checkbox" name="workdays" value="السبت"> سبت</label>
                    <label><input type="checkbox" name="workdays" value="الأحد"> أحد</label>
                    <label><input type="checkbox" name="workdays" value="الاثنين"> اثنين</label>
                    <label><input type="checkbox" name="workdays" value="الثلاثاء"> ثلاثاء</label>
                    <label><input type="checkbox" name="workdays" value="الأربعاء"> أربعاء</label>
                    <label><input type="checkbox" name="workdays" value="الخميس"> خميس</label>
                    <label><input type="checkbox" name="workdays" value="الجمعة"> جمعة</label>
                </span>
                <br>
                <button type="submit">حفظ البيانات</button>
            </form>
            <div id="personal-summary"></div>
            <button id="edit-personal-btn" style="display:none;margin-top:8px;">تعديل البيانات</button>
        </section>
    <!-- تم حذف عنوان الخطة الصحية اليومية بناءً على طلب المستخدم -->
        <section class="plan section" id="section-plan">
            <h2>الجدول اليومي</h2>
            <form id="plan-form" style="margin-bottom:12px;">
                <label>النشاط:</label>
                <input type="text" id="plan-activity" required style="width:180px;">
                <label>من:</label>
                <input type="time" id="plan-start" required style="width:90px;">
                <label>إلى:</label>
                <input type="time" id="plan-end" required style="width:90px;">
                <button type="submit">إضافة</button>
            </form>
            <div id="today-progress" style="margin-bottom:10px;"></div>
            <div id="plan-table-wrap"></div>
        </section>
        <section class="meals section" id="section-meals">
            <h2>تسجيل وجبة جديدة</h2>
            <form id="meals-page-form">
            <!-- نموذج إضافة نوع طعام جديد -->
            <form id="food-form" style="margin-top:18px; margin-bottom:18px; background:#f7f7f7; padding:12px; border-radius:8px;">
                <h3 style="margin-top:0;">إضافة نوع طعام جديد</h3>
                <label for="new-food-name">اسم الطعام:</label>
                <input type="text" id="new-food-name" name="new-food-name" required style="width:120px;">
                <label for="new-food-calories">السعرات لكل وحدة:</label>
                <input type="number" id="new-food-calories" name="new-food-calories" min="1" required style="width:80px;">
                <label for="new-food-unit">الوحدة:</label>
                <input type="text" id="new-food-unit" name="new-food-unit" value="جم" required style="width:60px;">
                <button type="submit">إضافة الطعام</button>
            </form>
                <label for="meals-page-meal-name">اسم الوجبة:</label>
                <select id="meals-page-meal-name" name="meal-name" required>
                    <option value="افطار">افطار</option>
                    <option value="غداء">غداء</option>
                    <option value="عشاء">عشاء</option>
                    <option value="سناك">سناك</option>
                </select>
                <label for="meals-page-food-type">نوع الطعام:</label>
                <select id="meals-page-food-type" name="food-type" required></select>
                <label for="meals-page-food-amount">الكمية (جم أو وحدة):</label>
                <input type="number" id="meals-page-food-amount" name="food-amount" min="1" required>
                <span id="meals-page-food-unit"></span>
                <label for="meals-page-meal-calories">السعرات (يحسب تلقائياً):</label>
                <input type="number" id="meals-page-meal-calories" name="meal-calories" min="0" readonly>
                <button type="submit">إضافة</button>
            </form>
            <div id="meals-page-total" style="margin-bottom:12px;font-weight:bold;"></div>
            <div id="food-list" style="margin-bottom:12px;"></div>
            <div id="meals-page-list"></div>
        </section>
            <!-- تم حذف الجدول غير المرغوب فيه -->
    </section>
    <section class="progress section" id="section-progress">
            <h2>تتبع الالتزام الأسبوعي</h2>
            <div id="weekly-progress">
                <!-- سيتم عرض النتائج هنا -->
            </div>
        </section>
        <section class="daily-log section" id="section-log">
            <h2>سجل الوزن والملاحظات اليومية</h2>
            <form id="log-form">
                <label for="weight">الوزن (كجم):</label>
                <input type="number" id="weight" name="weight" step="0.1" min="0" required>
                <br>
                <label for="note">ملاحظة:</label>
                <input type="text" id="note" name="note" maxlength="100">
                <br>
                <button type="submit">حفظ</button>
            </form>
            <div id="log-history"></div>
        </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
